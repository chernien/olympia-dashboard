<div class="password-manager-container">
    <div class="contact-list">
      <h3>Liste des contacts</h3>
      <ul>
        <li
          *ngFor="let contact of contacts"
          (click)="selectContact(contact)"
          [class.selected]="contact === selectedContact"
        >
          {{ contact.username }}
        </li>
      </ul>
    </div>
  
    <div class="password-form" *ngIf="selectedContact">
        <h3>Modifier le mot de passe pour {{ selectedContact.username }}</h3>
      
        <!-- Message de succès -->
        <div *ngIf="successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>
      
        <!-- Message d'erreur -->
        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>
      
        <form (ngSubmit)="onChangePassword()">
          <label for="oldPassword">Mot de passe actuel :</label>
          <input
            type="password"
            id="oldPassword"
            [(ngModel)]="oldPassword"
            name="oldPassword"
            required
          />
      
          <label for="newPassword">Nouveau mot de passe :</label>
          <input
            type="password"
            id="newPassword"
            [(ngModel)]="newPassword"
            name="newPassword"
            required
          />
      
          <label for="confirmPassword">Confirmer le mot de passe :</label>
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
      
          <button
            type="submit"
            [disabled]="!oldPassword || !newPassword || newPassword !== confirmPassword"
          >
            Modifier
          </button>
        </form>
      </div>
      
  </div>
